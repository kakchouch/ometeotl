name: Ometeotl Rank

on:
  pull_request_target:
    types: [closed]

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: write

jobs:
  assign-rank:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Compute rank, comment PR, and export artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          node <<'EOF'
          // ADDED: compute rank once and persist the result for the next workflow
          const fs = require("fs");

          const founder = "kakchouch";
          const owner = process.env.REPO_OWNER;
          const repo = process.env.REPO_NAME;
          const prNumber = Number(process.env.PR_NUMBER);
          const username = process.env.PR_AUTHOR;
          const token = process.env.GITHUB_TOKEN;

          async function gh(path, options = {}) {
            const response = await fetch(`https://api.github.com${path}`, {
              ...options,
              headers: {
                Authorization: `Bearer ${token}`,
                Accept: "application/vnd.github+json",
                "User-Agent": "ometeotl-rank-workflow",
                ...(options.headers || {})
              }
            });

            if (!response.ok) {
              const text = await response.text();
              throw new Error(`${response.status} ${response.statusText}: ${text}`);
            }

            return response.json();
          }

          function getRank(user, count) {
            if (user.toLowerCase() === founder.toLowerCase()) {
              return {
                key: "emperor",
                title: "Emperor",
                flavor: "Founder and principal maintainer of Ometeotl."
              };
            }

            if (count >= 20) {
              return {
                key: "shorn-one",
                title: "Shorn One",
                flavor: "Elite maintainer of the Order of Ometeotl."
              };
            }

            if (count >= 5) {
              return {
                key: "otomi",
                title: "Otomi",
                flavor: "Recognized warrior of the project."
              };
            }

            if (count >= 2) {
              return {
                key: "achcauhtili",
                title: "Achcauhtili",
                flavor: "Proven contributor on the path of the warrior."
              };
            }

            return {
              key: "eagle-warrior",
              title: "Eagle Warrior",
              flavor: "First blood in code. First victory in the Order."
            };
          }

          async function fetchAllMergedPRs() {
            // ADDED: paginate search results so we compute the full contribution history once
            const items = [];
            let page = 1;

            while (true) {
              const q = encodeURIComponent(
                `repo:${owner}/${repo} is:pr is:merged author:${username}`
              );

              const data = await gh(
                `/search/issues?q=${q}&per_page=100&page=${page}`
              );

              items.push(...data.items);

              if (data.items.length < 100) {
                break;
              }

              page += 1;
            }

            return items;
          }

          async function main() {
            const allPRs = await fetchAllMergedPRs();
            const mergedCount = allPRs.length;
            const rank = getRank(username, mergedCount);

            const body = [
              "## 🜂 Ometeotl Rank Awarded",
              "",
              `@${username}, this merged pull request brings your total to **${mergedCount} merged PR${mergedCount > 1 ? "s" : ""}** in **${owner}/${repo}**.`,
              "",
              `**New rank:** **${rank.title}**`,
              "",
              `_${rank.flavor}_`,
              "",
              "> All contributors walk the path of duality — creation and transmission.",
              ""
            ].join("\n");

            const comments = await gh(
              `/repos/${owner}/${repo}/issues/${prNumber}/comments?per_page=100`
            );

            const marker = "## 🜂 Ometeotl Rank Awarded";
            const existing = comments.find((comment) =>
              comment.body && comment.body.includes(marker)
            );

            if (existing) {
              await gh(
                `/repos/${owner}/${repo}/issues/comments/${existing.id}`,
                {
                  method: "PATCH",
                  headers: {
                    "Content-Type": "application/json"
                  },
                  body: JSON.stringify({ body })
                }
              );
            } else {
              await gh(
                `/repos/${owner}/${repo}/issues/${prNumber}/comments`,
                {
                  method: "POST",
                  headers: {
                    "Content-Type": "application/json"
                  },
                  body: JSON.stringify({ body })
                }
              );
            }

            // ADDED: persist all computed data for the next workflow
            const payload = {
              username,
              merged_count: mergedCount,
              rank_title: rank.title,
              rank_flavor: rank.flavor,
              prs: allPRs.map((item) => ({
                number: item.number,
                title: item.title,
                url: item.html_url
              }))
            };

            fs.writeFileSync(
              "rank-data.json",
              JSON.stringify(payload, null, 2),
              "utf8"
            );

            console.log(
              `Assigned rank ${rank.title} to ${username} (${mergedCount} merged PRs).`
            );
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          EOF

      - name: Upload rank artifact
        uses: actions/upload-artifact@v4
        with:
          # ADDED: artifact consumed by the second workflow
          name: rank-data
          path: rank-data.json