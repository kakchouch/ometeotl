# .github/workflows/ometeotl-ranks.yml
name: Ometeotl Ranks

on:
  pull_request_target:
    types: [closed]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  assign-rank:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    # ADDED: expose computed values once, so the second job does not recalculate them
    outputs:
      username: ${{ steps.compute.outputs.username }}
      merged_count: ${{ steps.compute.outputs.merged_count }}
      rank_title: ${{ steps.compute.outputs.rank_title }}
      rank_flavor: ${{ steps.compute.outputs.rank_flavor }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # ADDED: checkout target branch for consistency
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Compute rank and PR history
        id: compute
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          node <<'EOF'
          // ADDED: use Node.js directly instead of github-script to avoid hanging behavior
          const fs = require("fs");

          const founder = "kakchouch";
          const owner = process.env.REPO_OWNER;
          const repo = process.env.REPO_NAME;
          const username = process.env.PR_AUTHOR;
          const token = process.env.GITHUB_TOKEN;
          const outputFile = process.env.GITHUB_OUTPUT;

          async function gh(path, options = {}) {
            const response = await fetch(`https://api.github.com${path}`, {
              ...options,
              headers: {
                Authorization: `Bearer ${token}`,
                Accept: "application/vnd.github+json",
                "User-Agent": "ometeotl-ranks-workflow",
                ...(options.headers || {})
              }
            });

            if (!response.ok) {
              const text = await response.text();
              throw new Error(`${response.status} ${response.statusText}: ${text}`);
            }

            return response.json();
          }

          function getRank(user, count) {
            if (user.toLowerCase() === founder.toLowerCase()) {
              return {
                key: "emperor",
                title: "Emperor",
                flavor: "Founder and principal maintainer of Ometeotl."
              };
            }

            if (count >= 20) {
              return {
                key: "shorn-one",
                title: "Shorn One",
                flavor: "Elite maintainer of the Order of Ometeotl."
              };
            }

            if (count >= 5) {
              return {
                key: "otomi",
                title: "Otomi",
                flavor: "Recognized warrior of the project."
              };
            }

            if (count >= 2) {
              return {
                key: "achcauhtili",
                title: "Achcauhtili",
                flavor: "Proven contributor on the path of the warrior."
              };
            }

            return {
              key: "eagle-warrior",
              title: "Eagle Warrior",
              flavor: "First blood in code. First victory in the Order."
            };
          }

          async function fetchAllMergedPRs() {
            // ADDED: paginate explicitly so the count and PR list are computed only once here
            const items = [];
            let page = 1;

            while (true) {
              const q = encodeURIComponent(
                `repo:${owner}/${repo} is:pr is:merged author:${username}`
              );

              const data = await gh(
                `/search/issues?q=${q}&per_page=100&page=${page}`
              );

              items.push(...data.items);

              if (data.items.length < 100) {
                break;
              }

              page += 1;
            }

            return items;
          }

          async function main() {
            const allPRs = await fetchAllMergedPRs();
            const mergedCount = allPRs.length;
            const rank = getRank(username, mergedCount);

            // ADDED: persist the PR list as an artifact payload for the second job
            const payload = {
              username,
              merged_count: mergedCount,
              rank_title: rank.title,
              rank_flavor: rank.flavor,
              prs: allPRs.map((item) => ({
                title: item.title,
                url: item.html_url,
                number: item.number
              }))
            };

            fs.writeFileSync(
              "rank-data.json",
              JSON.stringify(payload, null, 2),
              "utf8"
            );

            // ADDED: write simple scalar outputs for cross-job reuse
            fs.appendFileSync(outputFile, `username=${username}\n`, "utf8");
            fs.appendFileSync(outputFile, `merged_count=${mergedCount}\n`, "utf8");
            fs.appendFileSync(outputFile, `rank_title=${rank.title}\n`, "utf8");
            fs.appendFileSync(outputFile, `rank_flavor=${rank.flavor}\n`, "utf8");

            console.log(
              `Computed rank ${rank.title} for ${username} with ${mergedCount} merged PRs.`
            );
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          EOF

      - name: Upload rank data artifact
        uses: actions/upload-artifact@v4
        with:
          # ADDED: artifact shared with the second job
          name: rank-data
          path: rank-data.json

      - name: Comment merged PR with rank
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          USERNAME: ${{ steps.compute.outputs.username }}
          MERGED_COUNT: ${{ steps.compute.outputs.merged_count }}
          RANK_TITLE: ${{ steps.compute.outputs.rank_title }}
          RANK_FLAVOR: ${{ steps.compute.outputs.rank_flavor }}
        run: |
          node <<'EOF'
          // ADDED: comment is generated from already computed outputs, no duplicated rank logic
          const owner = process.env.REPO_OWNER;
          const repo = process.env.REPO_NAME;
          const prNumber = Number(process.env.PR_NUMBER);
          const username = process.env.USERNAME;
          const mergedCount = process.env.MERGED_COUNT;
          const rankTitle = process.env.RANK_TITLE;
          const rankFlavor = process.env.RANK_FLAVOR;
          const token = process.env.GITHUB_TOKEN;

          async function gh(path, options = {}) {
            const response = await fetch(`https://api.github.com${path}`, {
              ...options,
              headers: {
                Authorization: `Bearer ${token}`,
                Accept: "application/vnd.github+json",
                "User-Agent": "ometeotl-ranks-workflow",
                ...(options.headers || {})
              }
            });

            if (!response.ok) {
              const text = await response.text();
              throw new Error(`${response.status} ${response.statusText}: ${text}`);
            }

            return response.json();
          }

          async function main() {
            const body = [
              "## 🜂 Ometeotl Rank Awarded",
              "",
              `@${username}, this merged pull request brings your total to **${mergedCount} merged PR${Number(mergedCount) > 1 ? "s" : ""}** in **${owner}/${repo}**.`,
              "",
              `**New rank:** **${rankTitle}**`,
              "",
              `_${rankFlavor}_`,
              "",
              "> All contributors walk the path of duality — creation and transmission.",
              ""
            ].join("\n");

            const comments = await gh(
              `/repos/${owner}/${repo}/issues/${prNumber}/comments?per_page=100`
            );

            const marker = "## 🜂 Ometeotl Rank Awarded";
            const existing = comments.find((comment) =>
              comment.body && comment.body.includes(marker)
            );

            if (existing) {
              await gh(
                `/repos/${owner}/${repo}/issues/comments/${existing.id}`,
                {
                  method: "PATCH",
                  headers: {
                    "Content-Type": "application/json"
                  },
                  body: JSON.stringify({ body })
                }
              );
            } else {
              await gh(
                `/repos/${owner}/${repo}/issues/${prNumber}/comments`,
                {
                  method: "POST",
                  headers: {
                    "Content-Type": "application/json"
                  },
                  body: JSON.stringify({ body })
                }
              );
            }

            console.log(`Posted rank comment for ${username}.`);
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          EOF

  update-contributors:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    needs: assign-rank

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # ADDED: use PAT to allow push on protected target branch
          token: ${{ secrets.OMETEOTL_BOT_TOKEN_CONTRIBUTORS }}
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Download rank data artifact
        uses: actions/download-artifact@v5
        with:
          # ADDED: retrieve the payload computed in the first job
          name: rank-data

      - name: Update CONTRIBUTORS.md
        env:
          USERNAME: ${{ needs.assign-rank.outputs.username }}
          MERGED_COUNT: ${{ needs.assign-rank.outputs.merged_count }}
          RANK_TITLE: ${{ needs.assign-rank.outputs.rank_title }}
          RANK_FLAVOR: ${{ needs.assign-rank.outputs.rank_flavor }}
        run: |
          node <<'EOF'
          // ADDED: rebuild CONTRIBUTORS.md using job outputs + downloaded artifact, without recomputing anything
          const fs = require("fs");

          const username = process.env.USERNAME;
          const mergedCount = process.env.MERGED_COUNT;
          const rankTitle = process.env.RANK_TITLE;
          const rankFlavor = process.env.RANK_FLAVOR;

          const rankData = JSON.parse(fs.readFileSync("rank-data.json", "utf8"));

          const prLines = rankData.prs
            .map((item) => `- [#${item.number} ${item.title}](${item.url})`)
            .join("\n");

          const contributorBlock = [
            `### @${username}`,
            "",
            `- **Rank:** ${rankTitle}`,
            `- **Merged PRs:** ${mergedCount}`,
            `- **Title flavor:** ${rankFlavor}`,
            "",
            "#### Merged Pull Requests",
            "",
            prLines,
            ""
          ].join("\n");

          const filePath = "CONTRIBUTORS.md";
          let content = "";

          if (fs.existsSync(filePath)) {
            content = fs.readFileSync(filePath, "utf8");
          } else {
            // ADDED: initialize the file if it does not exist yet
            content = [
              "# Contributors",
              "",
              "> *All contributors walk the path of duality — creation and transmission.*",
              "",
              ""
            ].join("\n");
          }

          const escapedUsername = username.replace(
            /[.*+?^${}()|[\]\\]/g,
            "\\$&"
          );

          const sectionRegex = new RegExp(
            `### @${escapedUsername}[\\s\\S]*?(?=\\n### |$)`,
            "g"
          );

          if (sectionRegex.test(content)) {
            // MODIFIED: replace the contributor section if it already exists
            content = content.replace(sectionRegex, contributorBlock);
          } else {
            // MODIFIED: append a new contributor section otherwise
            content += contributorBlock;
          }

          fs.writeFileSync(filePath, content, "utf8");
          console.log("CONTRIBUTORS.md updated successfully.");
          EOF

      - name: Commit and push CONTRIBUTORS.md
        env:
          GITHUB_TOKEN: ${{ secrets.OMETEOTL_BOT_TOKEN_CONTRIBUTORS }}
        run: |
          git config --local user.name "ometeotl-bot"
          git config --local user.email "bot@ometeotl.local"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git add CONTRIBUTORS.md

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs(contributors): update @${{ needs.assign-rank.outputs.username }}"
            git push origin HEAD:${{ github.event.pull_request.base.ref }}
          fi