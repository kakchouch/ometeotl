# .github/workflows/ometeotl-ranks.yml
name: Ometeotl Ranks

on:
  pull_request_target:
    types: [closed]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  assign-rank:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      # ADDED: checkout the target branch with the bot token
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # ADDED: use the PAT stored in repository secrets
          token: ${{ secrets.OMETEOTL_BOT_TOKEN_CONTRIBUTORS }}
          # ADDED: checkout the base branch that received the merge
          ref: ${{ github.event.pull_request.base.ref }}

      # ADDED: compute rank, comment on PR, and write CONTRIBUTORS.md
      - name: Assign Ometeotl rank and write CONTRIBUTORS.md
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // ADDED: import Node.js file system module
            const fs = require("fs");

            const founder = "kakchouch";

            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const username = pr.user.login;

            // ADDED: count merged PRs for the contributor
            const query = `repo:${owner}/${repo} is:pr is:merged author:${username}`;
            const search = await github.rest.search.issuesAndPullRequests({
              q: query,
              per_page: 1
            });

            const mergedCount = search.data.total_count;

            // ADDED: fetch all merged PRs for this contributor
            const allPRs = await github.paginate(
              github.rest.search.issuesAndPullRequests,
              {
                q: query,
                per_page: 100
              }
            );

            // ADDED: rank resolution logic
            function getRank(user, count) {
              if (user.toLowerCase() === founder.toLowerCase()) {
                return {
                  key: "emperor",
                  title: "Emperor",
                  flavor: "Founder and principal maintainer of Ometeotl."
                };
              }

              if (count >= 20) {
                return {
                  key: "shorn-one",
                  title: "Shorn One",
                  flavor: "Elite maintainer of the Order of Ometeotl."
                };
              }

              if (count >= 5) {
                return {
                  key: "otomi",
                  title: "Otomi",
                  flavor: "Recognized warrior of the project."
                };
              }

              if (count >= 2) {
                return {
                  key: "achcauhtili",
                  title: "Achcauhtili",
                  flavor: "Proven contributor on the path of the warrior."
                };
              }

              return {
                key: "eagle-warrior",
                title: "Eagle Warrior",
                flavor: "First blood in code. First victory in the Order."
              };
            }

            const rank = getRank(username, mergedCount);

            // ADDED: build the PR comment body
            const body = [
              "## 🜂 Ometeotl Rank Awarded",
              "",
              `@${username}, this merged pull request brings your total to **${mergedCount} merged PR${mergedCount > 1 ? "s" : ""}** in **${owner}/${repo}**.`,
              "",
              `**New rank:** **${rank.title}**`,
              "",
              `_${rank.flavor}_`,
              "",
              "> All contributors walk the path of duality — creation and transmission.",
              ""
            ].join("\n");

            // ADDED: fetch existing PR comments
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: pr.number,
              per_page: 100
            });

            // MODIFIED: detect the bot comment using a stable marker
            const marker = "## 🜂 Ometeotl Rank Awarded";
            const existing = comments.data.find((comment) =>
              comment.body && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body
              });
            }

            // ADDED: build the merged PR list for CONTRIBUTORS.md
            const prLines = allPRs
              .map((item) => `- [${item.title}](${item.html_url})`)
              .join("\n");

            // ADDED: contributor section content
            const contributorBlock = [
              `### @${username}`,
              "",
              `- **Rank:** ${rank.title}`,
              `- **Merged PRs:** ${mergedCount}`,
              "",
              "#### Merged Pull Requests",
              "",
              prLines,
              ""
            ].join("\n");

            // ADDED: load or initialize CONTRIBUTORS.md
            const filePath = "CONTRIBUTORS.md";
            let content = "";

            if (fs.existsSync(filePath)) {
              content = fs.readFileSync(filePath, "utf8");
            } else {
              content = [
                "# Contributors",
                "",
                "> *All contributors walk the path of duality — creation and transmission.*",
                "",
                ""
              ].join("\n");
            }

            // ADDED: replace existing contributor section or append a new one
            const escapedUsername = username.replace(
              /[.*+?^${}()|[\]\\]/g,
              "\\$&"
            );

            const sectionRegex = new RegExp(
              `### @${escapedUsername}[\\s\\S]*?(?=\\n### |$)`,
              "g"
            );

            if (sectionRegex.test(content)) {
              // MODIFIED: update an existing contributor block
              content = content.replace(sectionRegex, contributorBlock);
            } else {
              // MODIFIED: append a new contributor block
              content += contributorBlock;
            }

            // ADDED: write CONTRIBUTORS.md to disk
            fs.writeFileSync(filePath, content, "utf8");

            core.info(
              `Assigned rank ${rank.title} to ${username} (${mergedCount} merged PRs).`
            );
            core.info("CONTRIBUTORS.md updated in workspace.");

      # ADDED: commit and push the generated CONTRIBUTORS.md
      - name: Commit and push CONTRIBUTORS.md
        env:
          # ADDED: use the repository secret PAT for push
          GITHUB_TOKEN: ${{ secrets.OMETEOTL_BOT_TOKEN_CONTRIBUTORS }}
        run: |
          git config --local user.name "ometeotl-bot"
          git config --local user.email "bot@ometeotl.local"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git add CONTRIBUTORS.md

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs(contributors): update @${{ github.event.pull_request.user.login }}"
            git push origin HEAD:${{ github.event.pull_request.base.ref }}
          fi
