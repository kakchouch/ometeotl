<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lab 4 - Logistics Multi-Agent Simulation</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- ---------------------------------------------------------------- -->
    <!-- LEFT PANEL — SVG map                                             -->
    <!-- ---------------------------------------------------------------- -->
    <div id="map-panel">
      <div id="map-header">
        <span id="tick-counter">Tick: 0</span>
        <span id="status-text"></span>
      </div>
      <svg id="graph-svg" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
        <g id="edges-layer"></g>
        <g id="nodes-layer"></g>
        <g id="labels-layer"></g>
      </svg>
      <div id="controls">
        <button id="btn-step">⏭ Step</button>
        <button id="btn-autorun">▶ Auto-run</button>
        <label for="speed-slider">Speed</label>
        <input type="range" id="speed-slider" min="100" max="3000" step="100" value="1000" />
        <span id="speed-label">1.0 s</span>
        <button id="btn-reset">↺ Reset</button>
      </div>
      <div id="event-log">
        <div id="event-log-title">Event log</div>
        <ul id="event-list"></ul>
      </div>
    </div>

    <!-- ---------------------------------------------------------------- -->
    <!-- RIGHT PANEL — config + faction legend                            -->
    <!-- ---------------------------------------------------------------- -->
    <div id="side-panel">
      <section id="faction-legend">
        <h2>Factions</h2>
        <div id="faction-list"></div>
      </section>

      <section id="config-section">
        <h2>Configuration</h2>
        <form id="config-form">
          <div class="field-row">
            <label for="cfg-num-nodes">Nodes</label>
            <input type="number" id="cfg-num-nodes" name="num_nodes" min="4" max="60" value="14" />
          </div>
          <div class="field-row">
            <label for="cfg-num-factions">Factions</label>
            <input type="number" id="cfg-num-factions" name="num_factions" min="1" max="12" value="3" />
          </div>
          <div class="field-row">
            <label for="cfg-seed">RNG seed</label>
            <input type="number" id="cfg-seed" name="seed" value="42" />
          </div>
          <div class="field-row">
            <label for="cfg-min-spice">Min spice flow</label>
            <input type="number" id="cfg-min-spice" name="min_spice_flow" min="1" max="20" value="1" />
          </div>
          <div class="field-row">
            <label for="cfg-max-spice">Max spice flow</label>
            <input type="number" id="cfg-max-spice" name="max_spice_flow" min="1" max="50" value="8" />
          </div>
          <div class="field-row">
            <label for="cfg-density">Graph density</label>
            <input type="number" id="cfg-density" name="graph_density" min="0.05" max="1.0" step="0.05" value="0.25" />
          </div>
          <div class="field-row">
            <label for="cfg-flip">Flip threshold</label>
            <input type="number" id="cfg-flip" name="flip_threshold" min="1" max="500" step="1" value="20" />
          </div>
          <div class="field-row">
            <label for="cfg-drift">Drift threshold</label>
            <input type="number" id="cfg-drift" name="drift_threshold_fraction" min="0.1" max="1.0" step="0.05" value="0.5" />
          </div>
          <div class="field-row">
            <label for="cfg-genome">Genome length</label>
            <input type="number" id="cfg-genome" name="genome_length" min="4" max="64" step="4" value="16" />
          </div>
          <div class="field-row">
            <label for="cfg-mutation">Mutation rate</label>
            <input type="number" id="cfg-mutation" name="mutation_rate" min="0.0" max="1.0" step="0.01" value="0.05" />
          </div>
          <div class="field-row">
            <label for="cfg-max-ticks">Max ticks (0=∞)</label>
            <input type="number" id="cfg-max-ticks" name="max_ticks" min="0" max="10000" value="0" />
          </div>
          <div class="field-row">
            <label for="cfg-layout">Layout</label>
            <select id="cfg-layout" name="layout">
              <option value="ring" selected>Ring</option>
              <option value="grid">Grid</option>
            </select>
          </div>
          <div class="field-row">
            <label for="cfg-graph-mode">Graph mode</label>
            <select id="cfg-graph-mode" name="graph_mode">
              <option value="uniform" selected>Uniform random</option>
              <option value="geographic">Geographic map-like</option>
            </select>
          </div>
          <div class="field-row">
            <label for="cfg-perception-mode">Perception mode</label>
            <select id="cfg-perception-mode" name="perception_mode">
              <option value="limited" selected>Limited (neighbors only)</option>
              <option value="full">Full omniscience</option>
            </select>
          </div>
          <div class="field-row">
            <label for="cfg-initial-spice">Initial node spice</label>
            <input type="number" id="cfg-initial-spice" name="initial_node_spice" min="0" max="100" step="0.5" value="5" />
          </div>
          <div class="field-row">
            <label for="cfg-min-link">Min link capacity</label>
            <input type="number" id="cfg-min-link" name="min_link_flow" min="0.5" max="50" step="0.5" value="3" />
          </div>
          <div class="field-row">
            <label for="cfg-max-link">Max link capacity</label>
            <input type="number" id="cfg-max-link" name="max_link_flow" min="1" max="100" step="0.5" value="12" />
          </div>
          <div class="field-row">
            <label for="cfg-move-fraction">Max move fraction</label>
            <input type="number" id="cfg-move-fraction" name="max_spice_move_fraction" min="0.1" max="1.0" step="0.05" value="0.7" />
          </div>
          <div class="field-row">
            <label for="cfg-base-cost">Transport base cost</label>
            <input type="number" id="cfg-base-cost" name="transport_base_cost" min="0" max="20" step="0.1" value="1" />
          </div>
          <div class="field-row">
            <label for="cfg-gas-fee">Transport gas fee</label>
            <input type="number" id="cfg-gas-fee" name="transport_gas_fee" min="0" max="0.99" step="0.01" value="0.05" />
          </div>
          <button type="submit" id="btn-apply">Apply &amp; Reset</button>
        </form>
      </section>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
