name: Ometeotl Contributors

on:
  workflow_run:
    workflows: ["Ometeotl Rank"]
    types: [completed]

permissions:
  contents: write
  actions: read

jobs:
  update-contributors:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # ADDED: use PAT to allow push to the protected target branch
          token: ${{ secrets.OMETEOTL_BOT_TOKEN_CONTRIBUTORS }}
          # ADDED: checkout the branch targeted by the source workflow
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Download rank artifact from triggering workflow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          node <<'EOF'
          // ADDED: download the artifact produced by the triggering workflow_run
          const fs = require("fs");
          const path = require("path");
          const { execSync } = require("child_process");

          const owner = process.env.REPO_OWNER;
          const repo = process.env.REPO_NAME;
          const runId = process.env.RUN_ID;
          const token = process.env.GITHUB_TOKEN;

          async function gh(pathname, options = {}) {
            const response = await fetch(`https://api.github.com${pathname}`, {
              ...options,
              headers: {
                Authorization: `Bearer ${token}`,
                Accept: "application/vnd.github+json",
                "User-Agent": "ometeotl-contributors-workflow",
                ...(options.headers || {})
              }
            });

            if (!response.ok) {
              const text = await response.text();
              throw new Error(`${response.status} ${response.statusText}: ${text}`);
            }

            return response;
          }

          async function main() {
            const artifactsResponse = await gh(
              `/repos/${owner}/${repo}/actions/runs/${runId}/artifacts`
            );
            const artifactsData = await artifactsResponse.json();

            const artifact = artifactsData.artifacts.find(
              (item) => item.name === "rank-data"
            );

            if (!artifact) {
              throw new Error("Artifact 'rank-data' not found.");
            }

            const downloadResponse = await gh(
              `/repos/${owner}/${repo}/actions/artifacts/${artifact.id}/zip`,
              {
                headers: {
                  Accept: "application/vnd.github+json"
                }
              }
            );

            const arrayBuffer = await downloadResponse.arrayBuffer();
            fs.writeFileSync("rank-data.zip", Buffer.from(arrayBuffer));

            fs.mkdirSync("rank-data-artifact", { recursive: true });
            execSync("unzip -o rank-data.zip -d rank-data-artifact", {
              stdio: "inherit"
            });

            const extractedPath = path.join("rank-data-artifact", "rank-data.json");

            if (!fs.existsSync(extractedPath)) {
              throw new Error("rank-data.json not found in downloaded artifact.");
            }

            fs.copyFileSync(extractedPath, "rank-data.json");
            console.log("rank-data.json downloaded successfully.");
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          EOF

      - name: Update CONTRIBUTORS.md
        run: |
          node <<'EOF'
          // ADDED: rebuild CONTRIBUTORS.md from rank-data.json without recomputing rank or PR count
          const fs = require("fs");

          const rankData = JSON.parse(fs.readFileSync("rank-data.json", "utf8"));
          const username = rankData.username;
          const mergedCount = rankData.merged_count;
          const rankTitle = rankData.rank_title;

          const prLines = rankData.prs
            .map((item) => `- [#${item.number} ${item.title}](${item.url})`)
            .join("\n");

          const contributorBlock = [
            `### @${username}`,
            "",
            `- **Rank:** ${rankTitle}`,
            `- **Merged PRs:** ${mergedCount}`,
            "",
            "#### Merged Pull Requests",
            "",
            prLines,
            ""
          ].join("\n");

          const filePath = "CONTRIBUTORS.md";
          let content = "";

          if (fs.existsSync(filePath)) {
            content = fs.readFileSync(filePath, "utf8");
          } else {
            // ADDED: initialize CONTRIBUTORS.md on first run
            content = [
              "# Contributors",
              "",
              "> *All contributors walk the path of duality — creation and transmission.*",
              "",
              ""
            ].join("\n");
          }

          const escapedUsername = username.replace(
            /[.*+?^${}()|[\]\\]/g,
            "\\$&"
          );

          const sectionRegex = new RegExp(
            `### @${escapedUsername}[\\s\\S]*?(?=\\n### |$)`,
            "g"
          );

          if (sectionRegex.test(content)) {
            // MODIFIED: replace an existing contributor block
            content = content.replace(sectionRegex, contributorBlock);
          } else {
            // MODIFIED: append a new contributor block
            content += contributorBlock;
          }

          fs.writeFileSync(filePath, content, "utf8");
          console.log("CONTRIBUTORS.md updated successfully.");
          EOF

      - name: Commit and push CONTRIBUTORS.md
        env:
          GITHUB_TOKEN: ${{ secrets.OMETEOTL_BOT_TOKEN_CONTRIBUTORS }}
        run: |
          git config --local user.name "ometeotl-bot"
          git config --local user.email "bot@ometeotl.local"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git add CONTRIBUTORS.md

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs(contributors): update @$(node -p "require('./rank-data.json').username")"
            git push origin HEAD:${{ github.event.workflow_run.head_branch }}
          fi