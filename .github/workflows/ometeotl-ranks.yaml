# .github/workflows/ometeotl-ranks.yml
name: Ometeotl Ranks

on:
  pull_request_target:
    types: [closed]

# MODIFIED: added 'contents: write' to allow pushing CONTRIBUTORS.md
# feature tested on the 04/08/2026

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  assign-rank:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      # ADDED: checkout the repo so we can read/write CONTRIBUTORS.md
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # ADDED: use the target branch (the one receiving the merge)
          ref: ${{ github.event.pull_request.base.ref }}
      - name: Assign Ometeotl rank and update CONTRIBUTORS.md
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const founder = "kakchouch";

            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const username = pr.user.login;

            // Count merged PRs by this user in this repo
            const query = `repo:${owner}/${repo} is:pr is:merged author:${username}`;
            const search = await github.rest.search.issuesAndPullRequests({
              q: query,
              per_page: 1
            });

            const mergedCount = search.data.total_count;

            function getRank(user, count) {
              if (user.toLowerCase() === founder.toLowerCase()) {
                return {
                  key: "emperor",
                  title: "Emperor",
                  flavor: "Founder and principal maintainer of Ometeotl."
                };
              }
              if (count >= 20) {
                return {
                  key: "shorn-one",
                  title: "Shorn One",
                  flavor: "Elite maintainer of the Order of Ometeotl."
                };
              }
              if (count >= 5) {
                return {
                  key: "otomi",
                  title: "Otomi",
                  flavor: "Recognized warrior of the project."
                };
              }
              if (count >= 2) {
                return {
                  key: "achcauhtili",
                  title: "Achcauhtili",
                  flavor: "Proven contributor on the path of the warrior."
                };
              }
              return {
                key: "eagle-warrior",
                title: "Eagle Warrior",
                flavor: "First blood in code. First victory in the Order."
              };
            }

            const rank = getRank(username, mergedCount);

            const body = [
              `## 🜂 Ometeotl Rank Awarded`,
              ``,
              `@${username}, this merged pull request brings your total to **${mergedCount} merged PR${mergedCount > 1 ? "s" : ""}** in **${owner}/${repo}**.`,
              ``,
              `**New rank:** **${rank.title}**`,
              ``,
              `_${rank.flavor}_`,
              ``,
              `> All contributors walk the path of duality — creation and transmission.`,
              ``,
              `<!-- ometeotl-rank-bot -->`
            ].join("\n");

            // Find existing bot comment on this PR
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: pr.number,
              per_page: 100
            });

            const existing = comments.data.find(comment =>
              comment.body && comment.body.includes("<!-- ometeotl-rank-bot -->")
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body
              });
            }

                        // --- ADDED: Update CONTRIBUTORS.md ---

            // Build the list of PR titles with links for this contributor
            const prLines = allPRs
              .map(p => `  - [${p.title}](${p.html_url})`)
              .join("\n");

            // The block we want to insert/update for this contributor
            const contributorBlock = [
              `### @${username}`,
              ``,
              `- **Rank:** ${rank.title}`,
              `- **Merged PRs:** ${mergedCount}`,
              ``,
              `#### Merged Pull Requests`,
              ``,
              prLines,
              ``
            ].join("\n");

            // ADDED: read existing CONTRIBUTORS.md if it exists, else start fresh
            const filePath = "CONTRIBUTORS.md";
            let content = "";
            if (fs.existsSync(filePath)) {
              content = fs.readFileSync(filePath, "utf8");
            } else {
              // Create a default header if the file does not exist yet
              content = [
                `# Contributors`,
                ``,
                `> *All contributors walk the path of duality — creation and transmission.*`,
                ``,
                ``
              ].join("\n");
            }

            // ADDED: replace existing block for this user, or append a new one
            // We use a regex to find the section between ### @username and the next ### or end of file
            const sectionRegex = new RegExp(
              `### @${username}[\\s\\S]*?(?=\\n### |$)`,
              "g"
            );

            if (sectionRegex.test(content)) {
              // Update the existing block
              content = content.replace(sectionRegex, contributorBlock);
            } else {
              // Append the new block at the end
              content += contributorBlock;
            }

            // ADDED: write the updated file to disk
            fs.writeFileSync(filePath, content, "utf8");

            core.info(`Assigned rank ${rank.title} to ${username} (${mergedCount} merged PRs).`);

                  # ADDED: commit and push the updated CONTRIBUTORS.md to the target branch
      - name: Commit and push CONTRIBUTORS.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CONTRIBUTORS.md
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: update CONTRIBUTORS.md for @${{ github.event.pull_request.user.login }}"
          git push