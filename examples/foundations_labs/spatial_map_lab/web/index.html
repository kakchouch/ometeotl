<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spatial Map Lab — ometeotl foundations</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- ---------------------------------------------------------------- -->
    <!-- LEFT PANEL — SVG map + controls + event log                      -->
    <!-- ---------------------------------------------------------------- -->
    <div id="map-panel">
      <div id="map-header">
        <span id="tick-counter">Tick: 0</span>
        <span id="status-text"></span>
      </div>

      <svg id="map-svg" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
        <g id="edges-layer"></g>
        <g id="zones-layer"></g>
        <g id="labels-layer"></g>
        <g id="actors-layer"></g>
      </svg>

      <div id="controls">
        <button id="btn-step">&#9197; Step</button>
        <button id="btn-autorun">&#9654; Auto-run</button>
        <label for="speed-slider">Speed</label>
        <input type="range" id="speed-slider" min="100" max="3000" step="100" value="800" />
        <span id="speed-label">0.8 s</span>
        <button id="btn-reset">&#8634; Reset</button>
      </div>

      <div id="event-log">
        <div id="event-log-title">Event log</div>
        <ul id="event-list"></ul>
      </div>
    </div>

    <!-- ---------------------------------------------------------------- -->
    <!-- RIGHT PANEL — stats + config                                      -->
    <!-- ---------------------------------------------------------------- -->
    <div id="side-panel">

      <section id="stats-section">
        <h2>Spatial stats</h2>
        <div id="stats-list"></div>
      </section>

      <section id="zone-legend">
        <h2>Zone occupancy</h2>
        <div id="zone-list"></div>
      </section>

      <section id="config-section">
        <h2>Configuration</h2>
        <form id="config-form">
          <div class="field-row">
            <label for="cfg-cols">Grid columns</label>
            <input type="number" id="cfg-cols" name="grid_cols" min="2" max="12" value="5" />
          </div>
          <div class="field-row">
            <label for="cfg-rows">Grid rows</label>
            <input type="number" id="cfg-rows" name="grid_rows" min="2" max="12" value="4" />
          </div>
          <div class="field-row">
            <label for="cfg-zone-size">Zone size</label>
            <input type="number" id="cfg-zone-size" name="zone_size" min="10" max="500" step="10" value="100" />
          </div>
          <div class="field-row">
            <label for="cfg-zone-gap">Zone gap</label>
            <input type="number" id="cfg-zone-gap" name="zone_gap" min="0" max="100" step="1" value="5" />
          </div>
          <div class="field-row">
            <label for="cfg-actors">Actors</label>
            <input type="number" id="cfg-actors" name="num_actors" min="1" max="100" value="12" />
          </div>
          <div class="field-row">
            <label for="cfg-seed">RNG seed</label>
            <input type="number" id="cfg-seed" name="seed" value="42" />
          </div>
          <div class="field-row">
            <label for="cfg-move-prob">Move probability</label>
            <input type="number" id="cfg-move-prob" name="move_probability" min="0" max="1" step="0.05" value="0.7" />
          </div>
          <div class="field-row">
            <label for="cfg-max-ticks">Max ticks (0=&#x221e;)</label>
            <input type="number" id="cfg-max-ticks" name="max_ticks" min="0" max="10000" value="0" />
          </div>
          <button type="submit" id="btn-apply">Apply &amp; Reset</button>
        </form>
      </section>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
